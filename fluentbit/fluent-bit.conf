# ============================================================
# Fluent Bit Configuration — Dual Output to ES and OpenObserve
# ============================================================
# Replace <ES_IP> and <O2_IP> with your instance private IPs
# ============================================================

[SERVICE]
    Flush         5
    Log_Level     info
    Parsers_File  parsers.conf

# ── INPUT ────────────────────────────────────────────────────
# Read from the generator output file
[INPUT]
    Name              tail
    Tag               k8s.logs
    Path              /tmp/k8s_logs.json
    Parser            json
    DB                /tmp/flb_benchmark.db
    Mem_Buf_Limit     256MB
    Skip_Long_Lines   On
    Refresh_Interval  1

# ── OUTPUT 1: Elasticsearch ──────────────────────────────────
[OUTPUT]
    Name              es
    Match             k8s.logs
    Host              <ES_IP>
    Port              9200
    Index             logs_bench
    Logstash_Format   Off
    Type              _doc
    Include_Tag_Key   Off
    Buffer_Size       10MB
    Retry_Limit       3
    Workers           4

# ── OUTPUT 2: OpenObserve ─────────────────────────────────────
[OUTPUT]
    Name              http
    Match             k8s.logs
    Host              <O2_IP>
    Port              5080
    URI               /api/default/logs_bench/_json
    Format            json
    HTTP_User         admin@bench.com
    HTTP_Passwd       Bench1234!
    Buffer_Size       10MB
    Retry_Limit       3
    Workers           4
    tls               Off
